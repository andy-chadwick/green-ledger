    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Green Ledger",
      "url": "https://greenpartymanifesto.co.uk",
      "description": "An independent, evidence-based analysis of the Green Party UK's 2024 manifesto. 14 policies fact-checked against international data.",
      "author": {
        "@type": "Person",
        "name": "Andy Chadwick"
      }
    }
    </script>

    <!-- Structured Data: Article / AnalysisNewsArticle -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "Green Party Manifesto Analysed: 14 Policies Fact-Checked Against International Evidence",
      "description": "An independent review of 14 Green Party UK policies, tested against real-world outcomes from Norway, France, Germany, Scotland and Finland. Sources include the IFS, ONS, NIESR, SIPRI, and NBER.",
      "author": {
        "@type": "Person",
        "name": "Andy Chadwick"
      },
      "publisher": {
        "@type": "Organization",
        "name": "The Green Ledger"
      },
      "datePublished": "2026-03-22",
      "dateModified": "2026-03-22",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://greenpartymanifesto.co.uk"
      },
      "keywords": ["Green Party", "Green Party manifesto", "Green Party policies", "policy analysis", "fact check", "UK politics"],
      "about": [
        { "@type": "Thing", "name": "Green Party of England and Wales" },
        { "@type": "Thing", "name": "Political manifesto" },
        { "@type": "Thing", "name": "Fiscal policy" }
      ]
    }
    </script>

    <!-- Structured Data: FAQPage for common queries -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What would the Green Party's wealth tax actually raise?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Norway raised its wealth tax by 0.25 percentage points in 2022. Expected gain: $146m. Actual net loss: $594m after $54bn in capital flight. The IFS projects the full Green Party fiscal plan would increase UK borrowing by £80bn per year."
          }
        },
        {
          "@type": "Question",
          "name": "What happened when other countries tried rent controls?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "25 out of 26 academic studies reviewed by the IEA find that rent controls reduce housing supply. Scotland introduced a rent freeze in 2022: the private rented sector shrank from 15% to 13%, landlords exited, and Scottish rents are now rising faster than most of England."
          }
        },
        {
          "@type": "Question",
          "name": "How much would the Green Party's policies cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The IFS estimates the full Green Party programme would increase borrowing by £80bn per year. Individual policies range from the wealth tax (projected £50-70bn, likely far less due to capital flight) to universal basic income (£530bn per year, more than double the entire current welfare budget)."
          }
        }
      ]
    }
    </script>
